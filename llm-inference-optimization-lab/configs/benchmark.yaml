# Benchmark configuration

prompt_buckets:
  - short
  - medium
  - long

token_lengths:
  - 32
  - 64
  - 128

concurrency_levels:
  - 1
  - 2
  - 4
  - 8

repetitions: 1

output_dir: "./results"

# Warm-up requests before recording
warmup_requests: 2

# Timeout per request in seconds
request_timeout_s: 120

# Modes to benchmark
modes:
  - baseline
  - quantized
  - speculative
  - disaggregated
